name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: Configure Docker
        run: gcloud auth configure-docker gcr.io

      - name: Build and Push Docker Image
        run: |
          docker build --build-arg HF_TOKEN=${{ secrets.HF_TOKEN }} -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/fashion-search:latest .
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/fashion-search:latest

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v1
        with:
          service: fashion-search-api
          image: gcr.io/${{ secrets.GCP_PROJECT_ID }}/fashion-search:latest
          region: us-central1
          flags: '--allow-unauthenticated --memory=2Gi'
